<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лидерборд — экзамен по Python (админ)</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root {
  --ink: #1b1f24;
  --muted: #5b6470;
  --line: #e3e6ea;
  --accent: #2f6f5e;
  --accent-soft: #eaf3f0;
  --warn-bg: #fdf3e7;
}
* { box-sizing: border-box; }
body { margin:0; background:#fff; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; }
.page { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
h1 { font-size: 24px; margin: 0 0 6px; }
p.sub { color: var(--muted); margin: 0 0 24px; font-size: 14.5px; }
.warn-box { border-left: 3px solid #cf9b3f; background: var(--warn-bg); padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 20px; font-size: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
th { color: var(--muted); font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.03em; }
tr:first-child td { font-weight: 700; }
.pct { color: var(--accent); font-weight: 600; }
.refresh-btn {
  border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 8px 16px;
  font-size: 13.5px; cursor: pointer; margin-bottom: 16px; font-family: inherit;
}
.empty { color: var(--muted); padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<div class="page">
  <h1>Лидерборд: экзамен по Python</h1>
  <p class="sub">Результаты всех учеников, отсортированные по количеству правильных ответов.</p>
  <div id="warnBox"></div>
  <button class="refresh-btn" onclick="loadResults()">Обновить</button>
  <div id="content"><div class="empty">Загрузка...</div></div>
</div>

<script>
function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function loadResults() {
  const content = document.getElementById("content");
  const warnBox = document.getElementById("warnBox");

  if (!window.FIREBASE_CONFIGURED) {
    warnBox.innerHTML = `<div class="warn-box">Firebase не настроен. Впиши свои ключи в <code>firebase-config.js</code>, чтобы видеть результаты всех учеников здесь.</div>`;
    content.innerHTML = `<div class="empty">Нет данных.</div>`;
    return;
  }
  warnBox.innerHTML = "";
  content.innerHTML = `<div class="empty">Загрузка...</div>`;

  try {
    const db = firebase.firestore();
    const snap = await db.collection("examResults").orderBy("totalCorrect", "desc").get();
    if (snap.empty) {
      content.innerHTML = `<div class="empty">Пока нет ни одного результата.</div>`;
      return;
    }
    const rows = [];
    snap.forEach(doc => {
      const d = doc.data();
      const pct = d.totalMax ? Math.round((d.totalCorrect / d.totalMax) * 100) : 0;
      const ts = d.timestamp && d.timestamp.toDate ? d.timestamp.toDate().toLocaleString("ru-RU") : "—";
      rows.push({ name: d.name, test: d.test, theory: `${d.theoryCorrect}/${d.theoryTotal}`, task: `${d.taskCorrect}/${d.taskTotal}`, total: `${d.totalCorrect}/${d.totalMax}`, pct, ts });
    });
    const html = `
      <table>
        <tr><th>#</th><th>Имя</th><th>Вариант</th><th>Теория</th><th>Практика</th><th>Итого</th><th>%</th><th>Время</th></tr>
        ${rows.map((r, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(r.name)}</td>
            <td>${r.test === "test1" ? "1" : "2"}</td>
            <td>${r.theory}</td>
            <td>${r.task}</td>
            <td>${r.total}</td>
            <td class="pct">${r.pct}%</td>
            <td>${r.ts}</td>
          </tr>`).join("")}
      </table>`;
    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="empty">Ошибка загрузки: ${escapeHtml(e.message || e)}</div>`;
  }
}

loadResults();
</script>
</body>
</html>
